<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#374151;background:#fff;padding:10px 14px}
.ctrls{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:8px}
.ctrl{display:flex;align-items:center;gap:6px;flex:1;min-width:180px}
.ctrl label{font-size:12px;color:#6b7280;min-width:80px}
.ctrl input[type=range]{flex:1;height:4px;-webkit-appearance:none;appearance:none;background:#e5e7eb;border-radius:2px;outline:none}
.ctrl input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:#2563eb;cursor:pointer}
.ctrl span{font-size:12px;font-weight:500;min-width:24px;font-family:monospace}
.stats-row{display:flex;gap:6px;margin-bottom:8px}
.stat{background:#f8f9fb;border-radius:6px;padding:6px 8px;flex:1;min-width:0}
.stat-l{font-size:10px;color:#6b7280}
.stat-v{font-size:15px;font-weight:500;margin-top:1px}
.stat-s{font-size:9px;color:#9ca3af;font-family:monospace}
.mid{display:flex;gap:10px;margin-bottom:6px}
.panel{flex:1;min-width:0}
.panel-title{font-size:11px;color:#6b7280;margin-bottom:3px}
.denom-viz{display:flex;gap:1px;flex-wrap:wrap}
.denom-cell{width:10px;height:10px;border-radius:1px}
.legend{font-size:10px;color:#9ca3af;display:flex;gap:10px;margin-bottom:4px}
.legend span{display:flex;align-items:center;gap:3px}
.legend .sq{width:8px;height:8px;border-radius:1px;display:inline-block}
</style>
</head>
<body>

<div class="ctrls">
  <div class="ctrl">
    <label>Classes (C)</label>
    <input type="range" min="2" max="50" value="5" step="1" id="sl-c" oninput="update()">
    <span id="v-c">5</span>
  </div>
  <div class="ctrl">
    <label>Samples/class</label>
    <input type="range" min="2" max="20" value="6" step="1" id="sl-n" oninput="update()">
    <span id="v-n">6</span>
  </div>
</div>

<div class="stats-row">
  <div class="stat"><div class="stat-l">Loss gap bound</div><div class="stat-v" id="gap-val">-</div><div class="stat-s">e&sup2;/(C-1)</div></div>
  <div class="stat"><div class="stat-l">Same-class frac</div><div class="stat-v" id="frac-val">-</div><div class="stat-s">(n-1)/(N-1)</div></div>
  <div class="stat"><div class="stat-l">Total N</div><div class="stat-v" id="n-val">-</div><div class="stat-s">C&times;n</div></div>
</div>

<div class="mid">
  <div class="panel">
    <div class="panel-title">DCL denom (all others)</div>
    <div class="denom-viz" id="dcl-viz"></div>
  </div>
  <div class="panel">
    <div class="panel-title">NSCL denom (diff-class only)</div>
    <div class="denom-viz" id="nscl-viz"></div>
  </div>
</div>

<div class="legend">
  <span><span class="sq" style="background:#534AB7"></span> anchor</span>
  <span><span class="sq" style="background:#D3D1C7"></span> different class</span>
  <span><span class="sq" style="background:#E24B4A"></span> same-class neg.</span>
</div>

<div style="position:relative;width:100%;height:150px">
  <canvas id="gap-chart"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script>
const labels=[];const gapData=[];const fracData=[];
for(let c=2;c<=50;c++){labels.push(c);gapData.push(Math.exp(2)/(c-1));fracData.push(0)}
const chart=new Chart(document.getElementById('gap-chart'),{
  type:'line',
  data:{labels,datasets:[
    {label:'Loss gap bound',data:gapData,borderColor:'#534AB7',backgroundColor:'#534AB720',fill:true,pointRadius:0,borderWidth:1.5,tension:.3},
    {label:'Same-class frac',data:fracData,borderColor:'#E24B4A',backgroundColor:'#E24B4A20',fill:true,pointRadius:0,borderWidth:1.5,tension:.3,yAxisID:'y2'}
  ]},
  options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
    plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return c.dataset.label+': '+c.parsed.y.toFixed(3)}}}},
    scales:{
      x:{title:{display:true,text:'Classes (C)',font:{size:10}},grid:{display:false},ticks:{font:{size:9}}},
      y:{title:{display:true,text:'Gap',font:{size:10},color:'#534AB7'},position:'left',min:0,grid:{color:'rgba(0,0,0,0.04)'},ticks:{font:{size:9}}},
      y2:{title:{display:true,text:'Fraction',font:{size:10},color:'#E24B4A'},position:'right',min:0,max:1,grid:{display:false},ticks:{font:{size:9}}}
    }
  }
});
function update(){
  const C=+document.getElementById('sl-c').value;
  const n=+document.getElementById('sl-n').value;
  const N=C*n;
  document.getElementById('v-c').textContent=C;
  document.getElementById('v-n').textContent=n;
  document.getElementById('gap-val').textContent=(Math.exp(2)/(C-1)).toFixed(3);
  document.getElementById('frac-val').textContent=((n-1)/(N-1)*100).toFixed(1)+'%';
  document.getElementById('n-val').textContent=N;
  const dcl=document.getElementById('dcl-viz');
  const nscl=document.getElementById('nscl-viz');
  dcl.innerHTML='';nscl.innerHTML='';
  const maxShow=Math.min(N,100);
  for(let i=0;i<maxShow;i++){
    const cls=Math.floor(i/n);
    const isAnchor=i===0;
    const isSameClass=cls===0&&!isAnchor;
    const d1=document.createElement('div');d1.className='denom-cell';
    if(isAnchor){d1.style.background='#EEEDFE';d1.style.outline='2px solid #534AB7';d1.style.outlineOffset='-1px'}
    else if(isSameClass)d1.style.background='#E24B4A';
    else d1.style.background='#D3D1C7';
    dcl.appendChild(d1);
    const d2=document.createElement('div');d2.className='denom-cell';
    if(isAnchor){d2.style.background='#EEEDFE';d2.style.outline='2px solid #534AB7';d2.style.outlineOffset='-1px'}
    else if(isSameClass){d2.style.background='transparent';d2.style.border='1px dashed #ccc'}
    else d2.style.background='#D3D1C7';
    nscl.appendChild(d2);
  }
  for(let c=2;c<=50;c++)fracData[c-2]=(n-1)/(c*n-1);
  chart.data.datasets[1].data=[...fracData];chart.update('none');
}
update();
</script>
</body>
</html>
