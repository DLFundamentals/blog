
<style>
.row{display:flex;gap:16px;align-items:flex-start;flex-wrap:wrap}
.panel{flex:1;min-width:240px}
.ctrl{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.ctrl label{font-size:13px;color:var(--color-text-secondary);min-width:90px}
.ctrl span{font-size:13px;font-weight:500;min-width:32px;font-family:var(--font-mono);color:var(--color-text-primary)}
.stats-row{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-bottom:16px}
.stat{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px}
.stat-l{font-size:11px;color:var(--color-text-secondary)}
.stat-v{font-size:18px;font-weight:500;margin-top:2px;color:var(--color-text-primary)}
.stat-s{font-size:11px;color:var(--color-text-tertiary);font-family:var(--font-mono);margin-top:1px}
.denom-viz{display:flex;gap:2px;flex-wrap:wrap;margin:12px 0}
.denom-cell{width:14px;height:14px;border-radius:2px;transition:background .2s}
</style>

<div style="padding:1rem 0">

<div class="ctrl">
  <label>Classes (C)</label>
  <input type="range" min="2" max="50" value="5" step="1" id="sl-c" style="flex:1" oninput="update()">
  <span id="v-c">5</span>
</div>
<div class="ctrl">
  <label>Samples / class</label>
  <input type="range" min="2" max="20" value="6" step="1" id="sl-n" style="flex:1" oninput="update()">
  <span id="v-n">6</span>
</div>

<div class="stats-row">
  <div class="stat"><div class="stat-l">Loss gap bound</div><div class="stat-v" id="gap-val">-</div><div class="stat-s">e^2 / (C - 1)</div></div>
  <div class="stat"><div class="stat-l">Same-class fraction</div><div class="stat-v" id="frac-val">-</div><div class="stat-s">(n-1) / (N-1)</div></div>
  <div class="stat"><div class="stat-l">Total samples (N)</div><div class="stat-v" id="n-val">-</div><div class="stat-s">C * n</div></div>
</div>

<div class="row">
  <div class="panel">
    <div style="font-size:13px;color:var(--color-text-secondary);margin-bottom:6px">DCL denominator (all other samples)</div>
    <div class="denom-viz" id="dcl-viz"></div>
  </div>
  <div class="panel">
    <div style="font-size:13px;color:var(--color-text-secondary);margin-bottom:6px">NSCL denominator (different-class only)</div>
    <div class="denom-viz" id="nscl-viz"></div>
  </div>
</div>

<div style="font-size:12px;color:var(--color-text-tertiary);margin-top:4px;display:flex;gap:16px;flex-wrap:wrap">
  <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:#534AB7"></span> anchor class</span>
  <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:#D3D1C7"></span> different class (in both)</span>
  <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:#E24B4A"></span> same-class negatives (DCL only)</span>
</div>

<div style="position:relative;width:100%;height:200px;margin-top:20px">
  <canvas id="gap-chart"></canvas>
</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const ctx = document.getElementById('gap-chart');
const labels = [];
const gapData = [];
const fracData = [];
for(let c=2;c<=50;c++){labels.push(c);gapData.push(Math.exp(2)/(c-1));fracData.push(0)}

const chart = new Chart(ctx, {
  type:'line',
  data:{
    labels,
    datasets:[
      {label:'Loss gap bound',data:gapData,borderColor:'#534AB7',backgroundColor:'#534AB720',fill:true,pointRadius:0,borderWidth:2,tension:0.3},
      {label:'Same-class frac',data:fracData,borderColor:'#E24B4A',backgroundColor:'#E24B4A20',fill:true,pointRadius:0,borderWidth:2,tension:0.3,yAxisID:'y2'}
    ]
  },
  options:{
    responsive:true,
    maintainAspectRatio:false,
    interaction:{mode:'index',intersect:false},
    plugins:{
      legend:{display:false},
      tooltip:{
        callbacks:{
          label:function(c){return c.dataset.label+': '+c.parsed.y.toFixed(3)}
        }
      }
    },
    scales:{
      x:{title:{display:true,text:'Number of classes (C)',font:{size:12}},grid:{display:false}},
      y:{title:{display:true,text:'Gap bound',font:{size:12},color:'#534AB7'},position:'left',min:0,grid:{color:'rgba(0,0,0,0.05)'}},
      y2:{title:{display:true,text:'Same-class fraction',font:{size:12},color:'#E24B4A'},position:'right',min:0,max:1,grid:{display:false}}
    }
  }
});

function update(){
  const C=+document.getElementById('sl-c').value;
  const n=+document.getElementById('sl-n').value;
  const N=C*n;
  document.getElementById('v-c').textContent=C;
  document.getElementById('v-n').textContent=n;
  document.getElementById('gap-val').textContent=(Math.exp(2)/(C-1)).toFixed(3);
  document.getElementById('frac-val').textContent=((n-1)/(N-1)*100).toFixed(1)+'%';
  document.getElementById('n-val').textContent=N;

  const dcl=document.getElementById('dcl-viz');
  const nscl=document.getElementById('nscl-viz');
  dcl.innerHTML='';nscl.innerHTML='';

  const maxShow=Math.min(N,120);
  const anchorClass=0;
  for(let i=0;i<maxShow;i++){
    const cls=Math.floor(i/n);
    const isAnchor=i===0;
    const isSameClass=cls===anchorClass&&!isAnchor;

    const d1=document.createElement('div');
    d1.className='denom-cell';
    if(isAnchor) d1.style.background='#EEEDFE';
    else if(isSameClass) d1.style.background='#E24B4A';
    else d1.style.background='#D3D1C7';
    if(isAnchor){d1.style.border='2px solid #534AB7';d1.style.width='12px';d1.style.height='12px'}
    dcl.appendChild(d1);

    const d2=document.createElement('div');
    d2.className='denom-cell';
    if(isAnchor){d2.style.background='#EEEDFE';d2.style.border='2px solid #534AB7';d2.style.width='12px';d2.style.height='12px'}
    else if(isSameClass){d2.style.background='transparent';d2.style.border='1px dashed #D3D1C7'}
    else d2.style.background='#D3D1C7';
    nscl.appendChild(d2);
  }

  for(let c=2;c<=50;c++){
    fracData[c-2]=(n-1)/(c*n-1);
  }
  chart.data.datasets[1].data=[...fracData];
  chart.update('none');
}

update();
</script>
