<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:transparent; color:#111; padding:20px; }
@media (prefers-color-scheme:dark) { body { color:#e0ddd5; } }
h3 { font-size:15px; font-weight:600; margin-bottom:4px; letter-spacing:-.2px; }
.sub { font-size:12.5px; color:#555; margin-bottom:12px; }
@media (prefers-color-scheme:dark) { .sub { color:#a09e94; } }
.tabs { display:flex; gap:5px; margin-bottom:14px; flex-wrap:wrap; }
.tab { padding:4px 13px; border:1px solid #ccc; border-radius:16px; background:transparent; font-size:11px; cursor:pointer; transition:all .15s; color:#444; }
.tab:hover { background:rgba(128,128,128,.08); }
.tab.active { border-color:#3d9e7a; color:#2d7a5e; background:rgba(61,158,122,.08); }
@media (prefers-color-scheme:dark) { .tab { border-color:#555; color:#b0aea4; } .tab:hover { background:rgba(255,255,255,.05); } .tab.active { color:#7cc4aa; border-color:#5aa88a; background:rgba(88,166,140,.12); } }
.chart-area { position:relative; width:100%; height:300px; }
.caption { font-size:11.5px; color:#555; margin-top:8px; line-height:1.5; }
@media (prefers-color-scheme:dark) { .caption { color:#a09e94; } }
</style>
</head>
<body>
<h3>Length generalization: train at n=10, test at n=10…100</h3>
<p class="sub">All methods trained on 200 examples at input length 10</p>
<div class="tabs" id="tabs"></div>
<div class="chart-area"><canvas id="chart"></canvas></div>
<p class="caption" id="caption"></p>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const dk=matchMedia('(prefers-color-scheme:dark)').matches;
const gc=dk?'rgba(255,255,255,.08)':'rgba(0,0,0,.06)';
const tc=dk?'#a09e94':'#666';
const datasets={
  "IsPalindrome":{
    sgd:[98.2,54.8,46.9,50.2,49.9,50],
    ft:[52.4,52.1,51.3,51.1,50.2,49.7],
    pv:[100,100,49.2,70.3,69.7,69.6],
    caption:"SGD fits at n=10 but collapses to chance for longer inputs. LLM-PV partially generalizes — its program handles some but not all lengths."
  },
  "Pattern matching":{
    sgd:[98.6,55.7,52.5,51.3,50.2,50],
    ft:[69.4,69.4,66.1,66.2,65.7,57.2],
    pv:[100,100,100,100,100,100],
    caption:"LLM-PV synthesizes a dimension-invariant loop checking for the motif — 100% at every length. SGD memorizes and fails as n grows."
  },
  "Random 3-parity":{
    sgd:[58.4,55.2,53.9,53.1,50.8,50.2],
    ft:[50.9,50.9,50.7,53.3,51,51],
    pv:[100,100,100,100,100,100],
    caption:"The XOR rule over 3 bits is length-invariant. LLM-PV discovers exactly this and generalizes perfectly."
  }
};
const lengths=[10,20,25,30,50,100];
const tabC=document.getElementById('tabs');
let chart=null;
const colors={
  pv: dk?'#7cc4aa':'#2d8a66',
  sgd: dk?'#d4b080':'#a87840',
  ft: dk?'#c496b8':'#8e5882'
};
function renderChart(key){
  const d=datasets[key];
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.key===key));
  document.getElementById('caption').textContent=d.caption;
  if(chart)chart.destroy();
  chart=new Chart(document.getElementById('chart'),{
    type:'line',
    data:{
      labels:lengths.map(l=>'n='+l),
      datasets:[
        {label:'LLM-PV',data:d.pv,borderColor:colors.pv,backgroundColor:'transparent',fill:false,borderWidth:2.5,pointRadius:4.5,pointBackgroundColor:colors.pv,tension:.3,pointBorderWidth:0},
        {label:'SGD (best 1B)',data:d.sgd,borderColor:colors.sgd,backgroundColor:'transparent',borderWidth:1.8,pointRadius:3.5,pointBackgroundColor:colors.sgd,borderDash:[6,3],tension:.3,pointBorderWidth:0},
        {label:'Fine-tune (best)',data:d.ft,borderColor:colors.ft,backgroundColor:'transparent',borderWidth:1.8,pointRadius:3.5,pointBackgroundColor:colors.ft,borderDash:[3,3],tension:.3,pointBorderWidth:0},
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      animation:{duration:500,easing:'easeOutCubic'},
      plugins:{
        legend:{display:true,position:'top',labels:{font:{size:11},color:tc,usePointStyle:true,pointStyle:'circle',padding:14,boxWidth:8}},
        tooltip:{backgroundColor:dk?'rgba(50,48,42,.95)':'rgba(255,255,255,.97)',titleColor:dk?'#e0ddd5':'#222',bodyColor:dk?'#c0bdb5':'#444',borderColor:dk?'rgba(255,255,255,.12)':'rgba(0,0,0,.1)',borderWidth:1,cornerRadius:8,padding:10,bodyFont:{size:11.5}}
      },
      scales:{
        y:{min:40,max:105,grid:{color:gc},ticks:{color:tc,font:{size:10.5},callback:v=>v+'%'},border:{display:false}},
        x:{grid:{color:gc},ticks:{color:tc,font:{size:10.5}},border:{display:false}}
      }
    }
  });
}
Object.keys(datasets).forEach((key,i)=>{
  const btn=document.createElement('button');
  btn.className='tab'+(i===0?' active':'');
  btn.textContent=key;
  btn.dataset.key=key;
  btn.onclick=()=>renderChart(key);
  tabC.appendChild(btn);
});
renderChart(Object.keys(datasets)[0]);
</script>
</body>
</html>
