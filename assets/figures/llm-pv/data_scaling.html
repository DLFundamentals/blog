<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:transparent; color:#111; padding:20px; }
@media (prefers-color-scheme:dark) { body { color:#e0ddd5; } }
h3 { font-size:15px; font-weight:600; margin-bottom:4px; letter-spacing:-.2px; }
.sub { font-size:12.5px; color:#555; margin-bottom:12px; }
@media (prefers-color-scheme:dark) { .sub { color:#a09e94; } }
.tabs { display:flex; gap:5px; margin-bottom:14px; flex-wrap:wrap; }
.tab { padding:4px 13px; border:1px solid #ccc; border-radius:16px; background:transparent; font-size:11px; cursor:pointer; transition:all .15s; color:#444; }
.tab:hover { background:rgba(128,128,128,.08); }
.tab.active { border-color:#3d9e7a; color:#2d7a5e; background:rgba(61,158,122,.08); }
@media (prefers-color-scheme:dark) { .tab { border-color:#555; color:#b0aea4; } .tab:hover { background:rgba(255,255,255,.05); } .tab.active { color:#7cc4aa; border-color:#5aa88a; background:rgba(88,166,140,.12); } }
.chart-area { position:relative; width:100%; height:280px; }
.highlight-box { margin-top:10px; padding:10px 14px; border-radius:8px; background:rgba(61,158,122,.06); border:1px solid rgba(61,158,122,.15); font-size:12px; line-height:1.5; color:#333; }
@media (prefers-color-scheme:dark) { .highlight-box { background:rgba(88,166,140,.08); border-color:rgba(88,166,140,.15); color:#c0bdb5; } }
</style>
</head>
<body>
<h3>More data doesn't fix SGD on algorithmic tasks</h3>
<p class="sub">BLOOM-75M trained with up to 100k examples · LLM-PV needs only 200</p>
<div class="tabs" id="tabs"></div>
<div class="chart-area"><canvas id="chart"></canvas></div>
<div class="highlight-box" id="hl"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const dk=matchMedia('(prefers-color-scheme:dark)').matches;
const gc=dk?'rgba(255,255,255,.08)':'rgba(0,0,0,.06)';
const tc=dk?'#a09e94':'#666';
const labels=['10','100','200','1k','10k','100k'];
const colors={
  sgd_train: dk?'#d4b080':'#a87840',
  sgd_test: dk?'#d49088':'#a04840',
  pac: dk?'#8ea8d0':'#4e6e9e',
  pv: dk?'#7cc4aa':'#2d8a66',
};
const tasks={
  "10-Parity":{
    sgd_train:[100,100,100,100,99.9,99.8],sgd_test:[49.9,49.1,49.7,49.9,50.1,50.7],
    pv_test:[49.3,100,100,null,null,null],pac_ascii:[0,0,0,46.7,94.7,99.5],
    note:"10-Parity has a 30-character Python implementation. The PAC bound guarantees >99% at 100k — yet SGD stays at chance. LLM-PV solves it with 100 examples."
  },
  "CA Parity":{
    sgd_train:[100,100,100,100,99.6,99.9],sgd_test:[50.1,50.4,50.4,50,50,50.4],
    pv_test:[50.3,50.1,100,null,null,null],pac_ascii:[0,0,0,0,85.5,98.5],
    note:"Cellular Automata Parity composes a local nonlinear update with global parity. SGD cannot escape chance even at 100k. LLM-PV needs 200."
  },
  "IsPrime":{
    sgd_train:[100,100,100,100,100,100],sgd_test:[50.9,50.2,51.3,56.4,59.7,59.9],
    pv_test:[50.5,100,100,null,null,null],pac_ascii:[0,0,0,22.9,92.3,99.2],
    note:"Primality has a compact Miller–Rabin implementation. SGD reaches ~60% at 100k — far below the >99% PAC guarantee. LLM-PV achieves 100% from 100 examples."
  }
};
const tabC=document.getElementById('tabs');
let chart=null;
function renderChart(key){
  const d=tasks[key];
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.key===key));
  document.getElementById('hl').textContent=d.note;
  if(chart)chart.destroy();
  chart=new Chart(document.getElementById('chart'),{
    type:'line',
    data:{
      labels:labels,
      datasets:[
        {label:'SGD train',data:d.sgd_train,borderColor:colors.sgd_train,backgroundColor:'transparent',borderWidth:1.5,pointRadius:3,pointBackgroundColor:colors.sgd_train,borderDash:[4,4],tension:.3,pointBorderWidth:0},
        {label:'SGD test',data:d.sgd_test,borderColor:colors.sgd_test,backgroundColor:'transparent',fill:false,borderWidth:2.2,pointRadius:4,pointBackgroundColor:colors.sgd_test,tension:.3,pointBorderWidth:0},
        {label:'PAC bound (ERM)',data:d.pac_ascii,borderColor:colors.pac,backgroundColor:'transparent',borderWidth:1.5,pointRadius:3,pointBackgroundColor:colors.pac,borderDash:[8,4],tension:.3,pointStyle:'triangle',pointBorderWidth:0},
        {label:'LLM-PV test',data:d.pv_test,borderColor:colors.pv,backgroundColor:'transparent',fill:false,borderWidth:2.5,pointRadius:5.5,pointBackgroundColor:colors.pv,tension:.3,pointStyle:'rectRot',spanGaps:false,pointBorderWidth:0},
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      animation:{duration:450},
      plugins:{
        legend:{display:true,position:'top',labels:{font:{size:10.5},color:tc,usePointStyle:true,padding:12,boxWidth:8}},
        tooltip:{backgroundColor:dk?'rgba(50,48,42,.95)':'rgba(255,255,255,.97)',titleColor:dk?'#e0ddd5':'#222',bodyColor:dk?'#c0bdb5':'#444',borderColor:dk?'rgba(255,255,255,.12)':'rgba(0,0,0,.1)',borderWidth:1,cornerRadius:8,padding:10}
      },
      scales:{
        y:{min:0,max:105,grid:{color:gc},ticks:{color:tc,font:{size:10.5},callback:v=>v+'%'},border:{display:false}},
        x:{title:{display:true,text:'Training examples',color:tc,font:{size:10.5}},grid:{color:gc},ticks:{color:tc,font:{size:10.5}},border:{display:false}}
      }
    }
  });
}
Object.keys(tasks).forEach((key,i)=>{
  const btn=document.createElement('button');
  btn.className='tab'+(i===0?' active':'');
  btn.textContent=key;
  btn.dataset.key=key;
  btn.onclick=()=>renderChart(key);
  tabC.appendChild(btn);
});
renderChart(Object.keys(tasks)[0]);
</script>
</body>
</html>
