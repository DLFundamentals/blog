<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
html,body{margin:0;padding:0;overflow:hidden;height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#374151;background:#fdfdfd}
.sr{display:flex;gap:6px;align-items:center;padding:8px 12px}
button{padding:5px 16px;font-size:12px;font-weight:500;border-radius:20px;cursor:pointer;transition:all .2s}
button:active{transform:scale(0.96)}
.pri{background:#1d2939;color:#fff;border:none}
.pri:hover{opacity:0.85}
.pri:disabled{opacity:0.25;cursor:default}
.sec{background:transparent;color:#666;border:1px solid #e5e7eb}
.sec:hover{background:#f5f5f5}
.lbl{font-size:12px;color:#999;margin-left:auto;font-family:Georgia,serif;font-style:italic}
</style>
</head>
<body>
<div class="sr">
  <button class="pri" id="btn" onclick="go()">Begin</button>
  <button class="sec" onclick="rst()">Reset</button>
  <span class="lbl" id="lbl">Click to reveal the population D</span>
</div>
<canvas id="cv" style="width:100%;height:calc(100% - 42px);display:block"></canvas>

<script>
const cv=document.getElementById('cv'),cx=cv.getContext('2d');
let W,H,dpr;
function resize(){dpr=Math.min(window.devicePixelRatio||1,2);W=cv.clientWidth;H=cv.clientHeight;cv.width=W*dpr;cv.height=H*dpr;cx.setTransform(dpr,0,0,dpr,0,0)}
resize();

let sd=77;
function rn(){sd=(sd*1664525+1013904223)>>>0;return sd/4294967296}
function gs(){return Math.sqrt(-2*Math.log(rn()+1e-15))*Math.cos(6.2832*rn())}

const PAL=[
  '#6C63C7','#1B9E78','#D06B3C','#3B7DD8','#C94B7B',
  '#B08220','#5B8C2A','#7A7670','#8B80E0','#1A7A5E',
  '#A64430','#6AABE0','#DA7EA3','#D4A030','#7DB85A',
  '#C45454','#4BBAA0','#E0956A','#9E96D8','#E6B898'
];
const SRC=[0,1,2,3],TGT=[4,5,6];
const SRC_M=18,TGT_N=4;

const blobs=[];
sd=77;
for(let i=0;i<20;i++){
  const a=(i/20)*Math.PI*2+rn()*0.25;
  const r=0.2+rn()*0.17;
  const pts=[];sd=i*100+7;
  for(let j=0;j<10;j++)pts.push({dx:gs()*0.022,dy:gs()*0.022});
  blobs.push({cx:0.5+Math.cos(a)*r,cy:0.5+Math.sin(a)*r,color:PAL[i],pts,idx:i});
}

let step=0,animT=0,animStart=0,animActive=false;
let srcSmp=[],tgtSmp=[];

function genSmp(bi,n,seed){
  const b=blobs[bi];sd=seed;const r=[];
  for(let i=0;i<n;i++)r.push({x:b.cx+gs()*0.028,y:b.cy+gs()*0.028,color:b.color,cls:bi});
  return r;
}

const labels=['Click to reveal the population D','D: a population of class-conditional distributions',
  'Sample l = 4 source classes from D','Draw m = '+SRC_M+' labeled examples per source class',
  'Sample k = 3 new target classes from D','Draw n = '+TGT_N+' labeled examples per target class (few-shot)'];
const btns=['Begin','Sample source','Draw source data','Sample target','Draw target data',''];

function go(){
  if(step>4)return;
  step++;animT=0;animStart=performance.now();animActive=true;
  if(step===3){srcSmp=[];for(let c of SRC)srcSmp.push(...genSmp(c,SRC_M,c*500+42))}
  if(step===5){tgtSmp=[];for(let c of TGT)tgtSmp.push(...genSmp(c,TGT_N,c*500+999))}
  document.getElementById('lbl').textContent=labels[step];
  document.getElementById('btn').textContent=btns[step]||'Done';
  if(step>=5)document.getElementById('btn').disabled=true;
}
function rst(){
  step=0;animT=0;animActive=false;srcSmp=[];tgtSmp=[];
  document.getElementById('lbl').textContent=labels[0];
  document.getElementById('btn').textContent=btns[0];
  document.getElementById('btn').disabled=false;
}

function ease(t){return t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2}

function blobPath(c2,pcx,pcy,r,seed){
  sd=seed;c2.beginPath();
  for(let i=0;i<=80;i++){
    const a=(i/80)*Math.PI*2;
    let rr=r;
    for(let k=1;k<=5;k++)rr+=Math.sin(a*k*1.3+rn()*0.5)*r*0.08/k;
    const x=pcx+Math.cos(a)*rr,y=pcy+Math.sin(a)*rr;
    if(i===0)c2.moveTo(x,y);else c2.lineTo(x,y);
  }
  c2.closePath();
}

function drawCurvedArrow(c,x1,y1,x2,y2,t){
  const mx=(x1+x2)/2,my=Math.min(y1,y2)-30;
  c.save();c.globalAlpha=Math.min(1,(t-0.2)/0.6)*0.3;
  c.beginPath();c.moveTo(x1,y1);c.quadraticCurveTo(mx,my,x2,y2);
  c.strokeStyle='#666';c.lineWidth=1;c.setLineDash([3,3]);c.stroke();c.setLineDash([]);
  const dt=0.98,ax=2*(1-dt)*(mx-x1)+2*dt*(x2-mx),ay=2*(1-dt)*(my-y1)+2*dt*(y2-my),angle=Math.atan2(ay,ax);
  c.translate(x2,y2);c.rotate(angle);c.beginPath();c.moveTo(0,0);c.lineTo(-7,-3);c.lineTo(-7,3);c.closePath();c.fillStyle='#666';c.fill();c.restore();
}

function draw(){
  requestAnimationFrame(draw);
  if(animActive){animT=Math.min(1,(performance.now()-animStart)/700);if(animT>=1)animActive=false}
  const at=ease(animT);

  cx.clearRect(0,0,W,H);
  cx.fillStyle='#fdfdfd';cx.fillRect(0,0,W,H);

  const pcx=W*0.5,pcy=H*0.44,pr=Math.min(W,H)*0.34;
  const show=step>=1;

  if(show){
    const dA=step===1?at*0.6:0.6;
    cx.save();cx.globalAlpha=dA;sd=12345;
    blobPath(cx,pcx,pcy,pr*1.12,12345);
    cx.fillStyle='rgba(30,40,70,0.018)';cx.fill();
    cx.strokeStyle='rgba(30,40,70,0.06)';cx.lineWidth=0.8;cx.setLineDash([6,5]);cx.stroke();cx.setLineDash([]);
    cx.restore();
    cx.save();cx.globalAlpha=dA;cx.textAlign='center';
    cx.font='italic 14px Georgia,serif';cx.fillStyle='#888';cx.fillText('D',pcx,pcy-pr*1.0-10);
    cx.font='11px -apple-system,sans-serif';cx.fillStyle='#aaa';cx.fillText('population of classes',pcx,pcy-pr*1.0+6);
    cx.restore();
  }

  const srcX=W*0.15,tgtX=W*0.85,yB=H*0.18,ySp=H*0.19;
  const srcPk=step>=2,srcSd=step>=3,tgtPk=step>=4,tgtSd=step>=5;

  for(let i=0;i<blobs.length;i++){
    const b=blobs[i],isSrc=SRC.includes(i),isTgt=TGT.includes(i);
    let bx=pcx+(b.cx-0.5)*pr*2,by=pcy+(b.cy-0.5)*pr*1.6;
    let alpha=show?(step===1?at*0.55:0.55):0,sc=1;

    if(isSrc&&srcPk){const si=SRC.indexOf(i),mt=step===2?at:1;bx+=(srcX-bx)*mt;by+=(yB+si*ySp-by)*mt;alpha=0.5+mt*0.4;sc=1+mt*0.4}
    else if(isTgt&&tgtPk){const ti=TGT.indexOf(i),mt=step===4?at:1;bx+=(tgtX-bx)*mt;by+=(yB+ti*ySp-by)*mt;alpha=0.5+mt*0.4;sc=1+mt*0.4}
    else if(srcPk&&!isSrc){alpha=isTgt&&!tgtPk?0.18:0.1}
    if(!show)continue;

    cx.globalAlpha=alpha;
    for(let p of b.pts){cx.beginPath();cx.arc(bx+p.dx*pr*2*sc,by+p.dy*pr*2*sc,2.2*sc,0,Math.PI*2);cx.fillStyle=b.color;cx.fill()}
    cx.beginPath();cx.arc(bx,by,4.5*sc,0,Math.PI*2);cx.fillStyle=b.color;cx.fill();cx.globalAlpha=1;
  }

  if(srcSd){
    const sa=step===3?at:1;
    for(let j=0;j<srcSmp.length;j++){
      const p=srcSmp[j],si=SRC.indexOf(p.cls);
      const d=Math.min(1,Math.max(0,(sa-j/srcSmp.length*0.5)/0.5));
      if(d<=0)continue;
      cx.globalAlpha=d*0.7;cx.beginPath();cx.arc(srcX+(p.x-blobs[p.cls].cx)*pr*2.8,(yB+si*ySp)+(p.y-blobs[p.cls].cy)*pr*2.8,2.5,0,Math.PI*2);cx.fillStyle=p.color;cx.fill();cx.globalAlpha=1;
    }
  }

  if(tgtSd){
    const sa=step===5?at:1;
    for(let j=0;j<tgtSmp.length;j++){
      const p=tgtSmp[j],ti=TGT.indexOf(p.cls);
      const d=Math.min(1,Math.max(0,(sa-j/tgtSmp.length*0.3)/0.7));
      if(d<=0)continue;
      const px=tgtX+(p.x-blobs[p.cls].cx)*pr*2.8,py=(yB+ti*ySp)+(p.y-blobs[p.cls].cy)*pr*2.8;
      cx.globalAlpha=d*0.9;cx.beginPath();cx.arc(px,py,4.5,0,Math.PI*2);cx.fillStyle=p.color;cx.fill();
      cx.strokeStyle='#1d2939';cx.lineWidth=1.2;cx.stroke();cx.globalAlpha=1;
    }
  }

  cx.textAlign='center';

  if(srcPk){
    cx.globalAlpha=step===2?at:1;
    cx.font='500 12px -apple-system,sans-serif';cx.fillStyle='#444';cx.fillText('Source',srcX,H*0.05);
    cx.font='italic 11px Georgia,serif';cx.fillStyle='#888';cx.fillText('P\u0303\u2081, ..., P\u0303\u2084  ~  D',srcX,H*0.05+16);
    for(let si=0;si<SRC.length;si++){cx.font='italic 11px Georgia,serif';cx.fillStyle=blobs[SRC[si]].color;cx.fillText('P\u0303'+(si+1),srcX,yB+si*ySp-15)}
    if(srcSd){cx.font='11px -apple-system,sans-serif';cx.fillStyle='#aaa';cx.fillText('m = '+SRC_M+' samples',srcX,H-14)}
    cx.globalAlpha=1;
  }

  if(tgtPk){
    cx.globalAlpha=step===4?at:1;
    cx.font='500 12px -apple-system,sans-serif';cx.fillStyle='#444';cx.fillText('Target',tgtX,H*0.05);
    cx.font='italic 11px Georgia,serif';cx.fillStyle='#888';cx.fillText('P\u2081, ..., P\u2083  ~  D',tgtX,H*0.05+16);
    for(let ti=0;ti<TGT.length;ti++){cx.font='italic 11px Georgia,serif';cx.fillStyle=blobs[TGT[ti]].color;cx.fillText('P'+(ti+1),tgtX,yB+ti*ySp-15)}
    if(tgtSd){cx.font='11px -apple-system,sans-serif';cx.fillStyle='#aaa';cx.fillText('n = '+TGT_N+' samples',tgtX,H-14)}
    cx.globalAlpha=1;
  }

  if(srcPk&&step===2&&at>0.2)drawCurvedArrow(cx,pcx-pr*0.6,pcy-pr*0.3,srcX+40,yB+0.5*ySp,at);
  if(tgtPk&&step===4&&at>0.2)drawCurvedArrow(cx,pcx+pr*0.6,pcy-pr*0.3,tgtX-40,yB+0.5*ySp,at);

  if(srcSd&&tgtSd){
    cx.globalAlpha=(step===5?at:1)*0.15;cx.beginPath();cx.setLineDash([3,4]);
    cx.strokeStyle='#999';cx.lineWidth=0.5;cx.moveTo(W*0.5,H*0.08);cx.lineTo(W*0.5,H-6);cx.stroke();
    cx.setLineDash([]);cx.globalAlpha=1;
  }
}
draw();
window.addEventListener('resize',resize);
</script>
</body>
</html>
