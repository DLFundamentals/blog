---
layout: default
---

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400;1,6..72,500&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"
  onload="renderMathInElement(document.body,{delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}],throwOnError:false})">
</script>
<link rel="stylesheet" href="{{ '/assets/css/blog.css' | relative_url }}">

<article>
{{ content }}
</article>

<!-- Comments -->
{% unless page.comments == false %}
<div class="col" style="margin-top: 3rem;">
  <hr class="section-rule">
  <h2 style="font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 1.2rem; color: #0a1628; margin-top: 2rem; margin-bottom: 1.5rem; border: none; padding: 0;">Comments</h2>
  <script src="https://giscus.app/client.js"
    data-repo="DLFundamentals/blog"
    data-repo-id=""
    data-category="Blog Comments"
    data-category-id=""
    data-mapping="pathname"
    data-strict="0"
    data-reactions-enabled="1"
    data-emit-metadata="0"
    data-input-position="top"
    data-theme="light"
    data-lang="en"
    data-loading="lazy"
    crossorigin="anonymous"
    async>
  </script>
</div>
{% endunless %}
